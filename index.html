<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Mon Tableau de Bord</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap');

    /* Design System & Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e1a;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #6c8fff;
      --text: #e8eaf6;
      --muted: rgba(232,234,246,0.45);
    }

    body {
      height: 100vh; height: 100dvh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }

    /* Background Layer: Animated Gradient Orbs */
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%; filter: blur(100px);
      opacity: 0.22; animation: drift 14s ease-in-out infinite alternate; pointer-events: none; z-index: 0;
    }
    body::before { width: 500px; height: 500px; background: radial-gradient(circle, #4f6fff, transparent 70%); top: -120px; left: -120px; }
    body::after { width: 400px; height: 400px; background: radial-gradient(circle, #a855f7, transparent 70%); bottom: -60px; right: -60px; }
    
    @keyframes drift { 
      from { transform: translate(0,0); } 
      to { transform: translate(40px,30px); } 
    }

    /* Layout: Main Dashboard Container */
    .dashboard {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; gap: 15px;
      width: min(94vw, 500px); height: 92vh; max-height: 92dvh; padding: 10px;
    }

    /* Common Card Module */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 24px;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      transition: all .3s ease; display: flex; flex-direction: column; justify-content: center;
    }
    .card:hover { border-color: rgba(108,143,255,0.2); }

    /* Component: Real-time Clock */
    .card-time {
      flex: 1.2; text-align: center; padding: 20px;
      background: linear-gradient(135deg, rgba(108,143,255,0.12), rgba(167,139,250,0.06));
    }
    #clock {
      font-size: clamp(3.5rem, 15vw, 5.5rem); font-weight: 700;
      letter-spacing: -3px; line-height: 1;
      background: linear-gradient(135deg,#8faeff,#e0d7ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(108,143,255,0.2));
    }
    #date-label { margin-top: 8px; font-size: 1.1rem; color: var(--muted); }

    /* Component: Daily Ephemeris */
    .card-fete { flex: 0.8; align-items: center; padding: 15px; text-align: center; }
    .fete-icon { font-size: 2rem; margin-bottom: 6px; }
    .fete-text small { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 600; }
    .fete-text p { font-size: 1.2rem; font-weight: 600; color: #fff; margin-top: 2px; }

    /* Component: Search Engine Interface */
    .card-search-container { flex: 1; padding: 20px; }
    .quick-links { 
      display: flex; justify-content: center; gap: 8px; 
      margin-bottom: 15px; overflow-x: auto; scrollbar-width: none;
    }
    .link-item { 
      color: var(--muted); text-decoration: none; font-size: 0.7rem; font-weight: 700; 
      padding: 6px 10px; border-radius: 10px; background: rgba(255,255,255,0.03); 
      white-space: nowrap; transition: 0.2s;
    }
    .link-item:hover { background: var(--accent); color: #fff; transform: translateY(-1px); }

    .card-search-box { 
      background: #fff; border-radius: 28px; padding: 6px 8px 6px 20px; 
      display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .search-input { 
      flex: 1; border: none; outline: none; font-family: inherit; 
      font-size: 1.05rem; color: #333; background: transparent; 
    }
    .search-input:focus { font-weight: 700; color: #000; }
    
    .search-btn-submit { 
      background: var(--accent); border: none; width: 40px; height: 40px; 
      border-radius: 50%; cursor: pointer; display: flex; align-items: center; 
      justify-content: center; transition: 0.2s; font-size: 1.2rem;
    }
    .search-btn-submit:hover { background: #4f6fff; transform: scale(1.05); }

    /* Component: Weather Engine (Open-Meteo Integration) */
    .card-weather { flex: 1.2; padding: 20px 25px; }
    .weather-header { display: flex; align-items: center; margin-bottom: 12px; font-size: 0.9rem; }
    .sel-btn { 
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); 
      border-radius: 99px; padding: 6px 14px; color: var(--text); cursor: pointer;
    }
    .weather-main { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom: 12px; }
    .temp-max { font-size: 2.5rem; font-weight: 700; color: #ffe8a0; }
    
    .weather-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .stat-box { background:rgba(255,255,255,0.03); border-radius:16px; padding:10px 6px; text-align:center; border: 1px solid var(--border); }
    .stat-val { font-size:1.1rem; font-weight:600; }
    .stat-lbl { font-size:0.6rem; text-transform:uppercase; color:var(--muted); margin-top: 2px; }

    .footer { flex: 0.1; font-size: 0.65rem; color: rgba(255,255,255,0.15); text-align: center; }

    /* Media Queries: Mobile Optimization */
    @media (max-width: 480px) {
      .dashboard { gap: 10px; padding: 5px; height: 95vh; }
      .stat-val { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<div class="dashboard">
  <div class="card card-time">
    <div id="clock"><span id="h">--</span><span class="sep">h</span><span id="m">--</span></div>
    <div id="date-label">Initializing...</div>
  </div>

  <div class="card card-fete">
    <div class="fete-icon">🌸</div>
    <div class="fete-text">
      <small>Fête du jour</small>
      <p id="fete-name">...</p>
    </div>
  </div>

  <div class="card card-search-container">
    <div class="quick-links">
      <a href="https://mail.google.com" class="link-item">GMAIL</a>
      <a href="https://drive.google.com" class="link-item">DRIVE</a>
      <a href="https://www.youtube.com" class="link-item">YOUTUBE</a>
      <a href="https://gemini.google.com" class="link-item">GEMINI</a>
      <a href="https://translate.google.com" class="link-item">TRADUCTION</a>
    </div>

    <div class="card-search-box">
      <form action="https://www.google.com/search" method="GET" style="display:flex; width:100%; align-items:center;">
        <input class="search-input" type="text" name="q" placeholder="Rechercher..." autocomplete="off"/>
        <button type="submit" class="search-btn-submit">🚀</button>
      </form>
    </div>
  </div>

  <div class="card card-weather">
    <div class="weather-header">
      <button class="sel-btn" onclick="toggleSelector()">🇫🇷 Le Pellerin</button>
      <span class="weather-badge" id="w-badge">⏳</span>
      <div id="cityDropdown" style="display:none; position:absolute; background:#1a1e2e; border:1px solid var(--border); border-radius:12px; z-index:10; margin-top: 35px; min-width: 150px;"></div>
    </div>

    <div class="weather-main">
      <div id="w-icon" style="font-size:3rem">⏳</div>
      <div style="text-align:center">
        <span class="temp-max" id="w-max">--</span><small style="font-size:1.2rem; color:var(--muted)">°C</small>
        <div id="w-cond" style="font-size:0.8rem; color:var(--muted)">...</div>
      </div>
    </div>
    
    <div class="weather-stats">
      <div class="stat-box"><div class="stat-val" id="w-hum">--%</div><div class="stat-lbl">Humidité</div></div>
      <div class="stat-box"><div class="stat-val" id="w-rain">--%</div><div class="stat-lbl">Pluie</div></div>
      <div class="stat-box"><div class="stat-val" id="w-feel">--°</div><div class="stat-lbl">Ressenti</div></div>
    </div>
  </div>

  <div class="footer">Auto-refresh active (15m interval)</div>
</div>

<script>
/**
 * State Management & Constants
 */
const CITIES = [
  {name:'Le Pellerin', lat:47.1997, lon:-1.7508, flag:'🇫🇷'},
  {name:'Angers', lat:47.4784, lon:-0.5632, flag:'🇫🇷'},
  {name:'Paris', lat:48.8566, lon:2.3522, flag:'🇫🇷'},
  {name:'Marrakech', lat:31.6295, lon:-7.9811, flag:'🇲🇦'},
  {name:'Miami', lat:25.7617, lon:-80.1918, flag:'🇺🇸'}
];

const FETES = {"03-11":"Ste Rosine","03-12":"St Justine","12-25":"Noël"};
let currentCityIdx = 0;

/**
 * Clock Logic: Standard 24h format with date localization
 */
function updateClock() {
  const now = new Date();
  document.getElementById('h').textContent = String(now.getHours()).padStart(2,'0');
  document.getElementById('m').textContent = String(now.getMinutes()).padStart(2,'0');
  const J = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const M = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('date-label').textContent = `${J[now.getDay()]} ${now.getDate()} ${M[now.getMonth()]}`;
}

/**
 * Ephemeris Logic: Simple key-value lookup based on MM-DD
 */
function updateFete() {
  const now = new Date();
  const key = `${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  document.getElementById('fete-name').textContent = FETES[key] || "Bonne fête !";
}

/**
 * Weather Engine: Asynchronous Fetch from Open-Meteo API
 */
async function fetchWeather() {
  const city = CITIES[currentCityIdx];
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation_probability,weather_code&daily=temperature_2m_max&timezone=auto`;
  
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error('Network response failure');
    const data = await response.json();
    
    const current = data.current;
    document.getElementById('w-icon').textContent = current.weather_code === 0 ? "☀️" : current.weather_code <= 3 ? "🌤️" : "☁️";
    document.getElementById('w-max').textContent = Math.round(data.daily.temperature_2m_max[0]);
    document.getElementById('w-hum').textContent = Math.round(current.relative_humidity_2m) + "%";
    document.getElementById('w-rain').textContent = Math.round(current.precipitation_probability) + "%";
    document.getElementById('w-feel').textContent = Math.round(current.apparent_temperature) + "°";
    document.getElementById('w-cond').textContent = current.weather_code === 0 ? "Ciel dégagé" : "Partiellement couvert";
    document.getElementById('w-badge').textContent = "À jour";
  } catch (error) {
    console.error('Weather Fetch Error:', error);
    document.getElementById('w-badge').textContent = "Offline";
  }
}

/**
 * UI Interaction: Location Switcher
 */
function toggleSelector() {
  const el = document.getElementById('cityDropdown');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function buildCityDropdown() {
  const dd = document.getElementById('cityDropdown');
  CITIES.forEach((c, i) => {
    const opt = document.createElement('div');
    opt.style.cssText = "padding: 10px; cursor: pointer; font-size: 0.9rem; border-radius: 8px;";
    opt.innerHTML = `${c.flag} ${c.name}`;
    opt.onmouseover = () => opt.style.background = "rgba(108,143,255,0.1)";
    opt.onmouseout = () => opt.style.background = "transparent";
    opt.onclick = () => {
      currentCityIdx = i;
      document.querySelector('.sel-btn').textContent = `${c.flag} ${c.name}`;
      toggleSelector();
      fetchWeather();
    };
    dd.appendChild(opt);
  });
}

/**
 * Initial Entry Point
 */
buildCityDropdown();
updateClock();
updateFete();
fetchWeather();
setInterval(updateClock, 1000);
setInterval(fetchWeather, 900000); // 15min polling
</script>
</body>
</html>
